name: chain-reaction-puffer

services:
  puffer:
    image: ${PUFFER_IMAGE:-docker.io/pufferai/puffertank:4.0}
    working_dir: /workspace/chain-reaction/vendor/PufferLib
    shm_size: "8gb"
    environment:
      CHAIN_REACTION_REPO: /workspace/chain-reaction
      PUFFER_ROOT: /workspace/chain-reaction/vendor/PufferLib
      CHAIN_REACTION_TRAIN_TIMEOUT: ${CHAIN_REACTION_TRAIN_TIMEOUT:-10m}
      CHAIN_REACTION_TOTAL_TIMESTEPS: ${CHAIN_REACTION_TOTAL_TIMESTEPS:-10000000}
      CHAIN_REACTION_CHECKPOINT_INTERVAL: ${CHAIN_REACTION_CHECKPOINT_INTERVAL:-20}
      CHAIN_REACTION_LOG_INTERVAL: ${CHAIN_REACTION_LOG_INTERVAL:-25}
      CHAIN_REACTION_EVAL_INTERVAL: ${CHAIN_REACTION_EVAL_INTERVAL:-100}
      CHAIN_REACTION_EVAL_GAMES: ${CHAIN_REACTION_EVAL_GAMES:-32}
      CHAIN_REACTION_TOTAL_AGENTS: ${CHAIN_REACTION_TOTAL_AGENTS:-1024}
      CHAIN_REACTION_MINIBATCH_SIZE: ${CHAIN_REACTION_MINIBATCH_SIZE:-32768}
      CHAIN_REACTION_UPDATE_EPOCHS: ${CHAIN_REACTION_UPDATE_EPOCHS:-1}
      CHAIN_REACTION_LEARNING_RATE: ${CHAIN_REACTION_LEARNING_RATE:-0.0003}
      CHAIN_REACTION_WEIGHT_DECAY: ${CHAIN_REACTION_WEIGHT_DECAY:-0.0}
      CHAIN_REACTION_GAMMA: ${CHAIN_REACTION_GAMMA:-0.99}
      CHAIN_REACTION_GAE_LAMBDA: ${CHAIN_REACTION_GAE_LAMBDA:-0.95}
      CHAIN_REACTION_CLIP_COEF: ${CHAIN_REACTION_CLIP_COEF:-0.2}
      CHAIN_REACTION_VF_COEF: ${CHAIN_REACTION_VF_COEF:-0.5}
      CHAIN_REACTION_ENT_COEF: ${CHAIN_REACTION_ENT_COEF:-0.01}
      CHAIN_REACTION_MAX_GRAD_NORM: ${CHAIN_REACTION_MAX_GRAD_NORM:-1.0}
      CHAIN_REACTION_SEED: ${CHAIN_REACTION_SEED:-73}
      CHAIN_REACTION_HORIZON: ${CHAIN_REACTION_HORIZON:-128}
      CHAIN_REACTION_MAX_TURNS: ${CHAIN_REACTION_MAX_TURNS:-128}
      CHAIN_REACTION_BOARD_SIZE: ${CHAIN_REACTION_BOARD_SIZE:-8}
      CHAIN_REACTION_ACTIVE_WIDTH: ${CHAIN_REACTION_ACTIVE_WIDTH:-8}
      CHAIN_REACTION_ACTIVE_HEIGHT: ${CHAIN_REACTION_ACTIVE_HEIGHT:-8}
      CHAIN_REACTION_COMPILE_MODEL: ${CHAIN_REACTION_COMPILE_MODEL:--1}
      CHAIN_REACTION_COMPILE_MODE: ${CHAIN_REACTION_COMPILE_MODE:-default}
      CHAIN_REACTION_SYNC_GPU_STEP: ${CHAIN_REACTION_SYNC_GPU_STEP:-0}
      CHAIN_REACTION_SYNC_TIMING: ${CHAIN_REACTION_SYNC_TIMING:-0}
      CHAIN_REACTION_WANDB: ${CHAIN_REACTION_WANDB:-0}
      CHAIN_REACTION_WANDB_PROJECT: ${CHAIN_REACTION_WANDB_PROJECT:-chain-reaction}
      CHAIN_REACTION_WANDB_GROUP: ${CHAIN_REACTION_WANDB_GROUP:-torch-ppo}
      CHAIN_REACTION_WANDB_ENTITY: ${CHAIN_REACTION_WANDB_ENTITY:-}
      CHAIN_REACTION_WANDB_NAME: ${CHAIN_REACTION_WANDB_NAME:-}
      CHAIN_REACTION_WANDB_TAGS: ${CHAIN_REACTION_WANDB_TAGS:-}
      CHAIN_REACTION_WANDB_MODE: ${CHAIN_REACTION_WANDB_MODE:-}
      CHAIN_REACTION_WANDB_BASE_URL: ${CHAIN_REACTION_WANDB_BASE_URL:-}
      CHAIN_REACTION_WANDB_SILENT: ${CHAIN_REACTION_WANDB_SILENT:-1}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
      BUILD_ONLY: ${BUILD_ONLY:-0}
      PUFFER_BUILD_ARGS: ${PUFFER_BUILD_ARGS:-}
      EXTRA_CFLAGS: -I/workspace/chain-reaction
    volumes:
      - .:/workspace/chain-reaction:Z
      - ./training/checkpoints:/workspace/chain-reaction/vendor/PufferLib/checkpoints:Z
      - ./training/logs:/workspace/chain-reaction/vendor/PufferLib/logs:Z
    command:
      - bash
      - /workspace/chain-reaction/training/puffer_ocean/puffertank_train.sh
